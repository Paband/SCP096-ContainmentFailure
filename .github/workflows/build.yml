name: Build and Release

on:
  push:
    branches:
      - main 

jobs:
  build:
    runs-on: windows-latest 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x 

      - name: Restore dependencies
        run: dotnet restore src

      - name: Build project
        run: dotnet build src --configuration Release --no-restore

      - name: Publish build artifacts
        run: dotnet publish src --configuration Release --output build_output

      - name: Create zip file
        run: Compress-Archive -Path build_output\* -DestinationPath Scopophobia.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Scopophobia-Build
          path: Scopophobia-Build.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Scopophobia
          path: .

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Automatic build of Scopophobia.
            Triggered by push to main.
          files: Scopophobia.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
